 GER_aging_fuhrer:0 "Aging Fuhrer"
 GER_aging_fuhrer_desc:0 "As the Fuhrer grows older, his grip on power remains unshaken - held firmly in place by the unwavering loyalty of his inner circle. But loyalty born of ambition is a fickle thing, and the whispers in the corridors of the Reich grow louder with each passing year... For now, however, the circle holds."
