 GER_inner_circle.02.d:0 "[GetAscendedAdvisorName4] will carry on the Fuhrer's legacy."
 GER_inner_circle.02.e:0 "We are not ready for a change in leadership."
 GER_ascended_advisor_4_name_text:0 "§Y[GetAscendedAdvisorName4]§!"
