l_english:
 GER_german_controlled_reichskommissariat:0 "Reichskommissariat Moskowien"
 RKM_safeguard_moskau:0 "Safeguard Moskau"
 RKM_safeguard_moskau_desc:0 "Moscow must be brought firmly under German administration. We shall rename this great city and pacify its populace to secure our hold over the region."
 wif_moskau_pacification:0 "Moskau Pacification"
 wif_moskau_pacification_upgraded:0 "Moskau Pacification"
 wif_rkm.1.t:0 "Moskau Lost"
 wif_rkm.1.desc:0 "Moscow has fallen out of German control. The renaming and pacification efforts have been undone."
 wif_rkm.1.a:0 "A dark day..."
 RKM_collaborate_with_invader:0 "Collaborate with the Invader"
 RKM_collaborate_with_invader_desc:0 "Rather than resist the German occupation, we shall work with them. By proving our loyalty and usefulness, we can gain greater autonomy for our people."
 RKM_collaborate_autonomy:0 "Collaboration Rewards"
 local_collaborator:0 "Local Collaborator"
 local_collaborator_desc:0 "The local administration has chosen to cooperate with the occupying forces, easing compliance efforts across the Reichskommissariat."
 RKM_ryazan_labour_camps:0 "The Ryazan Labour Camps"
 RKM_ryazan_labour_camps_desc:0 "To consolidate our grip on Moskau, we shall forcibly relocate a portion of its population to labour camps in Ryazan. This will crush resistance in the capital but may stoke unrest in Ryazan itself."
 wif_ryazan_labour_camps:0 "Labour Camps"
 RKM_german_equipment:0 "German Equipment"
 RKM_german_equipment_desc:0 "Our forces are in dire need of proper armaments. We must petition the Reich for infantry equipment and additional manpower to secure the eastern territories."
 wif_rkm.2.t:0 "Equipment Request from Moskowien"
 wif_rkm.2.desc:0 "Reichskommissariat Moskowien has formally requested 15,000 infantry weapons and 20,000 men to reinforce their garrison forces in the east. Shall we comply?"
 wif_rkm.2.a:0 "Of course, the east needs to be secured\!"
 wif_rkm.2.b:0 "No, we cannot spare any extra equipment."
 wif_rkm.3.t:0 "Equipment Shipment Arrives"
 wif_rkm.3.desc:0 "Berlin has approved our request. Crates of rifles and fresh reinforcements are arriving at Moskau. Two new divisions can be raised immediately with the supplied equipment."
 wif_rkm.3.a:0 "Excellent, deploy them at once\!"
 wif_rkm.4.t:0 "Request Denied"
 wif_rkm.4.desc:0 "Berlin has rejected our request for equipment and reinforcements. We are on our own for now."
 wif_rkm.4.a:0 "We will manage somehow..."
 RKM_occupation_doctrine:0 "Reichskommissariat Occupation Doctrine"
 RKM_occupation_doctrine_desc:0 "As a Reichskommissariat, our occupation methods are dictated by Berlin. Only Harsh Quotas and Forced Labour are permitted. The Moscowien Garrison Division is the sole template authorized for garrison duty and cannot be modified."
 RKM_occupation_doctrine_2:0 "Reichskommissariat Occupation Doctrine"
 RKM_occupation_doctrine_2_desc:0 "Our grip on Moskau has improved the administrative efficiency of the Reichskommissariat, reducing the political burden of maintaining occupation."
 RKM_occupation_doctrine_3:0 "Reichskommissariat Occupation Doctrine"
 RKM_occupation_doctrine_3_desc:0 "The stabilisation of Moskau has dramatically improved our administrative capabilities. The political cost of occupation continues to decrease as order is restored."
 RKM_stabilise_moskau:0 "Stabilise Moskau"
 RKM_stabilise_moskau_desc:0 "The population of Moskau must be brought to heel through any means necessary. A massive operation to pacify the city will require §R10,000 Manpower§! and §R12,000 Infantry Equipment§! - resources we may need to request from Berlin. The result will be devastating for the local population, but Moskau will finally be ours."
 wif_rkm.5.t:0 "Stabilisation Request from Moskowien"
 wif_rkm.5.desc:0 "Reichskommissariat Moskowien lacks the resources to carry out their planned stabilisation of Moskau. They are requesting 10,000 men and 12,000 infantry weapons to proceed with the operation."
 wif_rkm.5.a:0 "Of course, the east needs to be secured\!"
 wif_rkm.5.b:0 "No, we cannot spare any extra equipment."
 wif_rkm.6.t:0 "Stabilisation Request Denied"
 wif_rkm.6.desc:0 "Berlin has refused to supply the resources needed for the Moskau stabilisation operation. We will have to acquire the necessary equipment and manpower on our own before we can proceed."
 wif_rkm.6.a:0 "We must find another way..."
 wif_rkm.10.t:0 "Moskau Stabilised"
 wif_rkm.10.desc:0 "The stabilisation of Moskau is complete. The operation has been brutal - a significant portion of the population has been removed through deportation, forced labour, and worse. But the city is now firmly under our control, and we can claim it as rightful territory of the Reichskommissariat."
 wif_rkm.10.a:0 "Moskau belongs to us now."
 RKM_work_with_ss:0 "Work with the SS"
 RKM_work_with_ss_desc:0 "The SS has offered to deploy elite mechanised forces to bolster our control over Moskau. Their methods are brutal but effective - resistance will be crushed, though compliance may suffer under their iron fist."
 RKM_work_with_wehrmacht:0 "Work with the Wehrmacht"
 RKM_work_with_wehrmacht_desc:0 "The Wehrmacht will provide a substantial garrison force to secure our territory. Ten full divisions of Moscowien Garrison troops will be deployed to Moskau, giving us the manpower to hold the region."
 RKM_ss_cooperation:0 "SS Cooperation"
 RKM_ss_cooperation_desc:0 "The SS has embedded its forces within the Reichskommissariat. Their presence reduces resistance through fear, but their harsh methods also suppress any willingness to cooperate among the local population."
 wif_rkm.11.t:0 "The Ryazan Labour Camps"
 wif_rkm.11.desc:0 "\"For our people to rise above all and thrive like is their destiny, the unwanted people must be dealt with\" - Adolf Hitler"
 wif_rkm.11.a:0 "We are doing what must be done."
 RKM_refurnish_kremlin:0 "Refurnish the Kremlin"
 RKM_refurnish_kremlin_desc:0 "The Kremlin stands as a symbol of power over these lands. By refurnishing it for German administration, we solidify our authority and demonstrate permanence to the local population."
 RKM_form_administration:0 "Form an Administration"
 RKM_form_administration_desc:0 "A proper administrative apparatus must be established to govern the Reichskommissariat effectively. Trained officials and military advisors will be brought in to create a functioning bureaucracy."
 RKM_admin_reich_officials:0 "Administration of Reich Officials"
 RKM_admin_reich_officials_desc:0 "German Reich officials will be installed throughout the administration. Additional garrison divisions will be raised in Moskau to enforce their authority, though they will be under-equipped and under-manned."
 RKM_work_with_russian_collaborators:0 "Work with Russian Collaborators"
 RKM_work_with_russian_collaborators_desc:0 "By working with willing Russian collaborators, we can establish a more stable administration. Their local knowledge and connections will help pacify the population and improve overall stability."
 RKM_kommissariat_panzer_wehrke:0 "Kommissariat Panzer Wehrke"
 RKM_kommissariat_gross_panzer_wehrke:0 "Kommissariat Gross Panzer Wehrke"
 RKM_ss_wehrmacht_balance:0 "Power Balance in Moskowien"
 RKM_ss_power:0 "SS Power in Moskowien"
 RKM_wehrmacht_power:0 "Wehrmacht Power in Moskowien"
 RKM_contested_control:0 "Contested Control"
 RKM_contested_control_desc:0 "Neither the SS nor the Wehrmacht holds a clear advantage in Moskowien. The power vacuum breeds instability."
 RKM_low_ss_influence:0 "Low SS Influence"
 RKM_low_ss_influence_desc:0 "The SS has begun to establish a presence in Moskowien, applying pressure on the local population through fear and intimidation."
 RKM_dominant_ss_influence:0 "Dominant SS Influence"
 RKM_dominant_ss_influence_desc:0 "The SS holds significant sway over Moskowien. Their brutal methods crush resistance but destroy any hope of willing compliance. SS mechanised units are favoured over regular infantry."
 RKM_huge_ss_influence:0 "Huge SS Influence"
 RKM_huge_ss_influence_desc:0 "The SS dominates nearly all aspects of life in Moskowien. Resistance is ruthlessly suppressed, but the population lives in terror with no incentive to cooperate."
 RKM_total_ss_control:0 "Total SS Control"
 RKM_total_ss_control_desc:0 "The SS has absolute control over Moskowien. The region is run as a police state - resistance is virtually nonexistent, but so is any semblance of normal life. Population decline is accelerating."
 RKM_low_wehrmacht_influence:0 "Low Wehrmacht Influence"
 RKM_low_wehrmacht_influence_desc:0 "The Wehrmacht maintains a modest presence in Moskowien, providing basic military order and a small reduction in resistance activity."
 RKM_dominant_wehrmacht_influence:0 "Dominant Wehrmacht Influence"
 RKM_dominant_wehrmacht_influence_desc:0 "The Wehrmacht has established firm military control over Moskowien. Their professional approach reduces resistance while maintaining some degree of order."
 RKM_sizable_wehrmacht_influence:0 "Sizable Wehrmacht Influence"
 RKM_sizable_wehrmacht_influence_desc:0 "The Wehrmacht exercises extensive control over Moskowien. Military governance has significantly reduced resistance, though compliance remains difficult to achieve."
 RKM_total_wehrmacht_control:0 "Total Wehrmacht Control"
 RKM_total_wehrmacht_control_desc:0 "The Wehrmacht has complete military authority over Moskowien. Their veteran officers command an efficient occupation force, and the combat experience gained strengthens all infantry operations."
 RKM_ss_military_doctrine:0 "SS Military Doctrine"
 RKM_ss_military_doctrine_desc:0 "The SS emphasis on mechanised warfare has shifted military priorities away from traditional infantry, favouring motorised and mechanised formations in Moskowien."
 RKM_the_long_work:0 "The Long Work Begins"
 RKM_the_long_work_desc:0 "With our chosen partners firmly in place, the real work of administering Moskowien can begin. Factories will be put to full use and resources channelled back to the Reich. But the Russian populace will not accept their fate quietly - terror attacks are inevitable."
 RKM_the_long_work_spirit:0 "The Long Work"
 RKM_the_long_work_spirit_desc:0 "The administration of Moskowien is now fully operational. Factories are running at increased capacity and resources are being funnelled to the overlord. However, the Russian resistance has begun a campaign of terror attacks across the Reichskommissariat."
 RKM_bread_and_circuses:0 "Bread and Circuses"
 RKM_bread_and_circuses_desc:0 "To win the hearts of the people of Moskau, we must provide for them. A massive programme of food distribution and public entertainment will drain our resources, but the goodwill earned will solidify our claim over the city."
 RKM_bread_and_circuses_spirit:0 "Bread and Circuses"
 RKM_bread_and_circuses_spirit_desc:0 "The Reichskommissariat is diverting the vast majority of its industrial output to provide food and entertainment to the population of Moskau in a bid to win their loyalty."
 RKM_expand_labour_camps:0 "Expand the Labour Camps"
 RKM_expand_labour_camps_desc:0 "The labour camps in Ryazan have proven effective at breaking the will of the local population. We shall expand their capacity and strengthen the fortifications surrounding them. The SS will oversee the expansion."
 RKM_railroad_to_berlin:0 "The Railroad to Berlin"
 RKM_railroad_to_berlin_desc:0 "A vast deportation programme will see populations from Smolensk and Vitebsk forcibly relocated to the Ryazan labour camps. The railroad infrastructure built to facilitate this will also support a new civilian factory in the region."
 RKM_purify_the_railroad:0 "Purify the Railroad"
 RKM_purify_the_railroad_desc:0 "The railroad connecting Moskowien to Berlin must be secured and cleansed of all undesirable elements. This operation will require significant manpower and equipment to carry out."
 RKM_establish_death_camp:0 "Establish the Death Camp"
 RKM_establish_death_camp_desc:0 "A facility of extermination will be constructed in Tikhvin. Those deemed unfit or resistant will be transported there. The population of the region will suffer catastrophic decline."
 RKM_to_death:0 "To Death"
 RKM_to_death_desc:0 "The undesirables of Smolensk and Vitebsk shall be dealt with in the most final manner. Thirty percent of their populations will be eliminated outright, and another thirty percent will be transported to the death camps in Tikhvin. The SS will oversee this operation personally."
 RKM_labour_for_moscowien:0 "Labour for Moscowien"
 RKM_labour_for_moscowien_desc:0 "The populations of Smolensk and Vitebsk can be put to productive use. A small portion will be culled, but the majority of the displaced will be sent to the labour camps in Ryazan, where they will fuel the Reichskommissariat's growing industrial base. The Wehrmacht favours this pragmatic approach."
 wif_death_camps:0 "Death Camps"
 wif_death_camps_intensified:0 "Death Camps - Intensified"
 wif_ryazan_labour_camps_expanded:0 "Expanded Labour Camps"
 wif_large_russian_resistance:0 "Large Russian Resistance"
 wif_large_russian_resistance_doubled:0 "Severe Russian Resistance"
 wif_large_russian_resistance_quintupled:0 "Devastating Russian Resistance"
 RKM_heroes_of_barbarossa:0 "Heroes of Barbarossa"
 RKM_heroes_of_barbarossa_desc:0 "Generalfeldmarschall Friedrich Paulus, hero of the eastern campaign, has been stationed in the Reich with little to do. We shall petition Berlin to transfer him to Moskowien, where his experience and leadership can be put to proper use. The city of Stalingrad shall be renamed in his honour."
 wif_rkm.21.t:0 "Moskowien Requests Friedrich Paulus"
 wif_rkm.21.desc:0 "Reichskommissariat Moskowien has formally requested that General Friedrich Paulus be transferred to their command. They wish to rename Stalingrad to Paulusberg in his honour. Shall we release him?"
 wif_rkm.21.a:0 "Paulus has earned his place in the east."
 wif_rkm.21.b:0 "We need Paulus here."
 wif_rkm.22.t:0 "Paulus Arrives in Moskowien"
 wif_rkm.22.desc:0 "Generalfeldmarschall Friedrich Paulus has arrived in Moskowien to take command. Stalingrad has been renamed to Paulusberg in his honour — a fitting tribute to the hero of Barbarossa."
 wif_rkm.22.a:0 "Welcome to Moskowien, Herr Generalfeldmarschall\!"
 wif_rkm.23.t:0 "Transfer Request Denied"
 wif_rkm.23.desc:0 "Berlin has refused to release Friedrich Paulus. The Reich requires his services elsewhere for the time being."
 wif_rkm.23.a:0 "Perhaps another time..."
 wif_rkm.24.t:0 "Death Camp Operations Normalise"
 wif_rkm.24.desc:0 "The intensified operations at the Tikhvin death camps have concluded. The facility returns to its standard rate of processing."
 wif_rkm.24.a:0 "Understood."
 RKM_mansteins_eastern_concern:0 "Manstein's Eastern Concern"
 RKM_mansteins_eastern_concern_desc:0 "Generalfeldmarschall Erich von Manstein has taken a personal interest in the security of the eastern territories. Under his directive, five fully equipped Wehrmacht infantry divisions are to be transferred to Moskowien, reinforcing the regular army's presence and tipping the balance of power away from the SS."
 RKM_ost_panzer:0 "Ost Panzer"
 RKM_ost_panzer_desc:0 "The Wehrmacht has authorised the transfer of 200 medium tanks from Germany's active production lines to Moskowien. These Panzers will form the backbone of our armoured capability in the east, further cementing Wehrmacht dominance over the region's military affairs."
 RKM_paulus_play:0 "Paulus Play"
 RKM_paulus_play_desc:0 "General Friedrich Paulus has devised a bold new anti-partisan doctrine combining infantry with armoured support and dedicated logistics companies. His combined-arms approach to counter-insurgency will dramatically shift the balance of power towards the Wehrmacht."
 RKM_paulus_play_tt:0 "Unlocks the §YPaulus's Gambit§! decision. A combined-arms anti-partisan operation using infantry, support equipment, and medium tanks."
 wif_paulus_gambit:0 "Paulus's Gambit in [FROM.GetName]"
 wif_paulus_gambit_desc:0 "Russian partisans have struck in [FROM.GetName]. Under General Paulus's doctrine, we shall deploy a combined-arms force with armoured support to hunt them down. This requires §R10,000 Manpower§!, §R200 Support Equipment§!, and §R10 Medium Tanks§!."
 RKM_expand_moscowien_ss:0 "Expand Moscowien's SS"
 RKM_expand_moscowien_ss_desc:0 "The SS has proven its worth in crushing resistance across Moskowien. We shall expand their presence by raising two additional mechanised divisions and granting them greater authority over the region."
 RKM_secret_backdoor_deals_with_himmler:0 "Secret Backdoor Deals with Himmler"
 RKM_secret_backdoor_deals_with_himmler_desc:0 "Through clandestine negotiations with Reichsführer-SS Heinrich Himmler, we have secured additional SS mechanised forces for Moskowien. These elite veterans arrive fully equipped and battle-hardened, further cementing the SS grip over the region."
 RKM_ss_krieg:0 "SS Krieg"
 RKM_ss_krieg_desc:0 "The SS shall become the dominant military force in Moskowien. With Himmler's full backing, we will entrench SS authority across the region and deploy mechanised forces to crush any resistance with overwhelming firepower."
 RKM_ss_krieg_tt:0 "Unlocks the §YDeploy the Mechanised Forces§! decision. A more effective but costlier alternative to chasing terrorists on foot."
 wif_deploy_mechanised_forces:0 "Deploy the Mechanised Forces in [FROM.GetName]"
 wif_deploy_mechanised_forces_desc:0 "Russian partisans have struck in [FROM.GetName]. We shall deploy SS mechanised forces to hunt them down. This requires §R10,000 Manpower§! and §R500 Mechanised Equipment§!, but our armoured troops are far more effective at eliminating partisan cells."
 RKM_fight_the_terrorists:0 "Fight the Terrorists"
 RKM_fight_the_terrorists_desc:0 "The Russian partisans have terrorised our territories for long enough. We shall establish a dedicated anti-partisan command to hunt them down. When they strike, our forces will pursue them and destroy their cells."
 RKM_fight_the_terrorists_tt:0 "Unlocks the §YChase the Terrorists§! decision category. After each terror attack, a decision will appear allowing you to send forces to hunt the partisans."
 wif_chase_terrorists:0 "Chase the Terrorists"
 wif_attack_partisan_activity:0 "Attack partisan activity in [FROM.GetName]"
 wif_attack_partisan_activity_desc:0 "Russian partisans have struck in [FROM.GetName]. We shall deploy 10,000 men to hunt them down and restore order. The outcome is uncertain."
 wif_rkm.25.t:0 "Complete Success"
 wif_rkm.25.desc:0 "Our forces achieved a decisive victory against the partisans in [event_target:partisan_state.GetName]. The terrorist cell has been completely destroyed, the region is stabilised, and the next attack has been significantly delayed."
 wif_rkm.25.a:0 "Excellent work\!"
 wif_rkm.26.t:0 "The Terrorists Got Away But Region Stabilised"
 wif_rkm.26.desc:0 "Our forces swept through [event_target:partisan_state.GetName] and restored order, but the partisan leaders managed to escape into the countryside. The region is stable for now, though the threat remains."
 wif_rkm.26.a:0 "At least the region is secure."
 wif_rkm.27.t:0 "Harsh Battle"
 wif_rkm.27.desc:0 "The operation in [event_target:partisan_state.GetName] turned into a brutal engagement. We took significant casualties but managed to clear the area. The region is stabilised, though at great cost."
 wif_rkm.27.a:0 "A pyrrhic victory."
 wif_rkm.28.t:0 "Failed to Pursue"
 wif_rkm.28.desc:0 "Our forces deployed to [event_target:partisan_state.GetName] but failed to locate the partisan cells. The terrorists remain at large and the region continues to suffer from their presence."
 wif_rkm.28.a:0 "They will not escape forever."
 wif_rkm.29.t:0 "Forces Routed"
 wif_rkm.29.desc:0 "The operation in [event_target:partisan_state.GetName] was a disaster. Our forces walked into an ambush and were routed by the partisans. The terrorists are now emboldened and their grip on the region has tightened considerably."
 wif_rkm.29.a:0 "This is humiliating."
 wif_rkm.30.t:0 "Total Defeat"
 wif_rkm.30.desc:0 "Catastrophe in [event_target:partisan_state.GetName]. Our entire force was annihilated by a well-coordinated partisan offensive. None of the 10,000 men returned. The region has been lost to the terrorists, who have declared it a liberated zone. Emboldened partisans across Moskowien are accelerating their attacks."
 wif_rkm.30.a:0 "God help us..."
 wif_rkm.31.t:0 "Demilitarization Lifted"
 wif_rkm.31.desc:0 "The demilitarized zone has been lifted. Our forces can once again operate in the formerly contested area."
 wif_rkm.31.a:0 "Resume operations."
 wif_rkm.20.t:0 "Russian Terror Attack"
 wif_rkm.20.desc:0 "On [GetDateText], infrastructure and buildings in [terror_attack_state.GetName] were attacked by Russian Resistance, killing both garrison and civilians."
 wif_rkm.20.a:0 "We will destroy them eventually."
