l_english:
 RKM_safeguard_moskau:0 "Safeguard Moskau"
 RKM_safeguard_moskau_desc:0 "Moscow must be brought firmly under German administration. We shall rename this great city and pacify its populace to secure our hold over the region."
 wif_moskau_pacification:0 "Moskau Pacification"
 wif_moskau_pacification_upgraded:0 "Moskau Pacification"
 wif_rkm.1.t:0 "Moskau Lost"
 wif_rkm.1.desc:0 "Moscow has fallen out of German control. The renaming and pacification efforts have been undone."
 wif_rkm.1.a:0 "A dark day..."
 RKM_collaborate_with_invader:0 "Collaborate with the Invader"
 RKM_collaborate_with_invader_desc:0 "Rather than resist the German occupation, we shall work with them. By proving our loyalty and usefulness, we can gain greater autonomy for our people."
 RKM_collaborate_autonomy:0 "Collaboration Rewards"
 local_collaborator:0 "Local Collaborator"
 local_collaborator_desc:0 "The local administration has chosen to cooperate with the occupying forces, easing compliance efforts across the Reichskommissariat."
 RKM_ryazan_labour_camps:0 "The Ryazan Labour Camps"
 RKM_ryazan_labour_camps_desc:0 "To consolidate our grip on Moskau, we shall forcibly relocate a portion of its population to labour camps in Ryazan. This will crush resistance in the capital but may stoke unrest in Ryazan itself."
 wif_ryazan_labour_camps:0 "Labour Camps"
 RKM_german_equipment:0 "German Equipment"
 RKM_german_equipment_desc:0 "Our forces are in dire need of proper armaments. We must petition the Reich for infantry equipment and additional manpower to secure the eastern territories."
 wif_rkm.2.t:0 "Equipment Request from Moskowien"
 wif_rkm.2.desc:0 "Reichskommissariat Moskowien has formally requested 15,000 infantry weapons and 20,000 men to reinforce their garrison forces in the east. Shall we comply?"
 wif_rkm.2.a:0 "Of course, the east needs to be secured\!"
 wif_rkm.2.b:0 "No, we cannot spare any extra equipment."
 wif_rkm.3.t:0 "Equipment Shipment Arrives"
 wif_rkm.3.desc:0 "Berlin has approved our request. Crates of rifles and fresh reinforcements are arriving at Moskau. Two new divisions can be raised immediately with the supplied equipment."
 wif_rkm.3.a:0 "Excellent, deploy them at once\!"
 wif_rkm.4.t:0 "Request Denied"
 wif_rkm.4.desc:0 "Berlin has rejected our request for equipment and reinforcements. We are on our own for now."
 wif_rkm.4.a:0 "We will manage somehow..."
 RKM_occupation_doctrine:0 "Reichskommissariat Occupation Doctrine"
 RKM_occupation_doctrine_desc:0 "As a Reichskommissariat, our occupation methods are dictated by Berlin. Only Harsh Quotas and Forced Labour are permitted. The Moscowien Garrison Division is the sole template authorized for garrison duty and cannot be modified."
 RKM_stabilise_moskau:0 "Stabilise Moskau"
 RKM_stabilise_moskau_desc:0 "The population of Moskau must be brought to heel through any means necessary. A massive operation to pacify the city will require §R10,000 Manpower§! and §R12,000 Infantry Equipment§! - resources we may need to request from Berlin. The result will be devastating for the local population, but Moskau will finally be ours."
 wif_rkm.5.t:0 "Stabilisation Request from Moskowien"
 wif_rkm.5.desc:0 "Reichskommissariat Moskowien lacks the resources to carry out their planned stabilisation of Moskau. They are requesting 10,000 men and 12,000 infantry weapons to proceed with the operation."
 wif_rkm.5.a:0 "Of course, the east needs to be secured\!"
 wif_rkm.5.b:0 "No, we cannot spare any extra equipment."
 wif_rkm.6.t:0 "Stabilisation Request Denied"
 wif_rkm.6.desc:0 "Berlin has refused to supply the resources needed for the Moskau stabilisation operation. We will have to acquire the necessary equipment and manpower on our own before we can proceed."
 wif_rkm.6.a:0 "We must find another way..."
 wif_rkm.10.t:0 "Moskau Stabilised"
 wif_rkm.10.desc:0 "The stabilisation of Moskau is complete. The operation has been brutal - a significant portion of the population has been removed through deportation, forced labour, and worse. But the city is now firmly under our control, and we can claim it as rightful territory of the Reichskommissariat."
 wif_rkm.10.a:0 "Moskau belongs to us now."
 RKM_work_with_ss:0 "Work with the SS"
 RKM_work_with_ss_desc:0 "The SS has offered to deploy elite mechanised forces to bolster our control over Moskau. Their methods are brutal but effective - resistance will be crushed, though compliance may suffer under their iron fist."
 RKM_work_with_wehrmacht:0 "Work with the Wehrmacht"
 RKM_work_with_wehrmacht_desc:0 "The Wehrmacht will provide a substantial garrison force to secure our territory. Ten full divisions of Moscowien Garrison troops will be deployed to Moskau, giving us the manpower to hold the region."
 RKM_ss_cooperation:0 "SS Cooperation"
 RKM_ss_cooperation_desc:0 "The SS has embedded its forces within the Reichskommissariat. Their presence reduces resistance through fear, but their harsh methods also suppress any willingness to cooperate among the local population."
 wif_rkm.11.t:0 "The Ryazan Labour Camps"
 wif_rkm.11.desc:0 "\"For our people to rise above all and thrive like is their destiny, the unwanted people must be dealt with\" - Adolf Hitler"
 wif_rkm.11.a:0 "We are doing what must be done."
 RKM_refurnish_kremlin:0 "Refurnish the Kremlin"
 RKM_refurnish_kremlin_desc:0 "The Kremlin stands as a symbol of power over these lands. By refurnishing it for German administration, we solidify our authority and demonstrate permanence to the local population."
 RKM_form_administration:0 "Form an Administration"
 RKM_form_administration_desc:0 "A proper administrative apparatus must be established to govern the Reichskommissariat effectively. Trained officials and military advisors will be brought in to create a functioning bureaucracy."
 RKM_admin_reich_officials:0 "Administration of Reich Officials"
 RKM_admin_reich_officials_desc:0 "German Reich officials will be installed throughout the administration. Additional garrison divisions will be raised in Moskau to enforce their authority, though they will be under-equipped and under-manned."
 RKM_work_with_russian_collaborators:0 "Work with Russian Collaborators"
 RKM_work_with_russian_collaborators_desc:0 "By working with willing Russian collaborators, we can establish a more stable administration. Their local knowledge and connections will help pacify the population and improve overall stability."
 RKM_kommissariat_panzer_wehrke:0 "Kommissariat Panzer Wehrke"
 RKM_kommissariat_gross_panzer_wehrke:0 "Kommissariat Gross Panzer Wehrke"
 RKM_ss_wehrmacht_balance:0 "Power Balance in Moskowien"
 RKM_ss_power:0 "SS Power in Moskowien"
 RKM_wehrmacht_power:0 "Wehrmacht Power in Moskowien"
 RKM_contested_control:0 "Contested Control"
 RKM_contested_control_desc:0 "Neither the SS nor the Wehrmacht holds a clear advantage in Moskowien. The power vacuum breeds instability."
 RKM_low_ss_influence:0 "Low SS Influence"
 RKM_low_ss_influence_desc:0 "The SS has begun to establish a presence in Moskowien, applying pressure on the local population through fear and intimidation."
 RKM_dominant_ss_influence:0 "Dominant SS Influence"
 RKM_dominant_ss_influence_desc:0 "The SS holds significant sway over Moskowien. Their brutal methods crush resistance but destroy any hope of willing compliance. SS mechanised units are favoured over regular infantry."
 RKM_huge_ss_influence:0 "Huge SS Influence"
 RKM_huge_ss_influence_desc:0 "The SS dominates nearly all aspects of life in Moskowien. Resistance is ruthlessly suppressed, but the population lives in terror with no incentive to cooperate."
 RKM_total_ss_control:0 "Total SS Control"
 RKM_total_ss_control_desc:0 "The SS has absolute control over Moskowien. The region is run as a police state - resistance is virtually nonexistent, but so is any semblance of normal life. Population decline is accelerating."
 RKM_low_wehrmacht_influence:0 "Low Wehrmacht Influence"
 RKM_low_wehrmacht_influence_desc:0 "The Wehrmacht maintains a modest presence in Moskowien, providing basic military order and a small reduction in resistance activity."
 RKM_dominant_wehrmacht_influence:0 "Dominant Wehrmacht Influence"
 RKM_dominant_wehrmacht_influence_desc:0 "The Wehrmacht has established firm military control over Moskowien. Their professional approach reduces resistance while maintaining some degree of order."
 RKM_sizable_wehrmacht_influence:0 "Sizable Wehrmacht Influence"
 RKM_sizable_wehrmacht_influence_desc:0 "The Wehrmacht exercises extensive control over Moskowien. Military governance has significantly reduced resistance, though compliance remains difficult to achieve."
 RKM_total_wehrmacht_control:0 "Total Wehrmacht Control"
 RKM_total_wehrmacht_control_desc:0 "The Wehrmacht has complete military authority over Moskowien. Their veteran officers command an efficient occupation force, and the combat experience gained strengthens all infantry operations."
 RKM_ss_military_doctrine:0 "SS Military Doctrine"
 RKM_ss_military_doctrine_desc:0 "The SS emphasis on mechanised warfare has shifted military priorities away from traditional infantry, favouring motorised and mechanised formations in Moskowien."
